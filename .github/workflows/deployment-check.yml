# Vercel Deployment Check
#
# Runs after Vercel deploys a preview/production build.
# Hits the deployment URL and verifies it returns 2xx.
# Used with Vercel Deployment Checks to gate production promotion.
#
# Setup:
#   1. Enable "Protection Bypass for Automation" in Vercel project settings
#      (Settings → Deployment Protection → Protection Bypass for Automation)
#   2. Copy the generated secret and add it as a GitHub Actions secret:
#      VERCEL_AUTOMATION_BYPASS_SECRET
#   3. Enable Deployment Checks and select "Deployment Check: Health"
#   4. Vercel won't promote to production until this passes
#
# For non-Vercel deployments, this workflow is a no-op.

name: Deployment Check

on:
  deployment_status:

permissions:
  checks: write
  statuses: write
  deployments: read

jobs:
  smoke-test:
    # Only run when the deployment is ready (not pending/failed)
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get deployment info
        id: info
        run: |
          URL="${{ github.event.deployment_status.target_url }}"
          if [ -z "$URL" ]; then
            URL="${{ github.event.deployment_status.environment_url }}"
          fi
          # deployment_status events set context.sha to default branch HEAD,
          # NOT the deployed commit. Use the deployment SHA instead.
          SHA="${{ github.event.deployment.sha }}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "🔗 Deployment URL: $URL"
          echo "🔑 Deployment SHA: $SHA"

      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Health check
        id: health
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          URL="${{ steps.info.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "⚠️ No deployment URL found — skipping check"
            echo "result=success" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "🔥 Checking $URL ..."

          # Build curl args — add bypass header if secret is available
          CURL_ARGS=(-s -o /dev/null -w "%{http_code}" --max-time 30)
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            CURL_ARGS+=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")
            echo "🔑 Using Vercel automation bypass token"
          else
            echo "⚠️ No VERCEL_AUTOMATION_BYPASS_SECRET set — 401 from protected deployments will pass as non-5xx"
          fi

          # Retry up to 3 times with backoff
          for attempt in 1 2 3; do
            STATUS=$(curl "${CURL_ARGS[@]}" "$URL" || echo "000")
            echo "  Attempt $attempt: HTTP $STATUS"

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "✅ Deployment is healthy (HTTP $STATUS)"
              echo "result=success" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [ "$STATUS" -ge 500 ]; then
              echo "❌ Server error detected (HTTP $STATUS)"
              if [ "$attempt" -lt 3 ]; then
                echo "  Retrying in $((attempt * 10))s..."
                sleep $((attempt * 10))
              fi
            elif [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
              echo "❌ Unexpected HTTP $STATUS with bypass token"
              if [ "$attempt" -lt 3 ]; then
                echo "  Retrying in $((attempt * 10))s..."
                sleep $((attempt * 10))
              fi
            else
              echo "⚠️ Got HTTP $STATUS — not a 5xx, passing (set VERCEL_AUTOMATION_BYPASS_SECRET for full check)"
              echo "result=success" >> $GITHUB_OUTPUT
              exit 0
            fi
          done

          echo ""
          echo "💥 Deployment check FAILED — $URL returned HTTP $STATUS after 3 attempts"
          echo "result=failure" >> $GITHUB_OUTPUT
          exit 1

      # Report status back via commit status on the DEPLOYMENT sha
      - name: Report check result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.info.outputs.sha }}' || context.sha;
            const state = '${{ steps.health.outputs.result }}' === 'success' ? 'success' : 'failure';
            console.log(`Reporting ${state} on ${sha}`);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              context: 'Deployment Check: Health',
              description: state === 'success' ? 'Deployment is healthy' : 'Deployment health check failed',
            });

  # When the deployment itself fails, still report a status so Vercel
  # doesn't wait indefinitely for the check.
  report-failed-deployment:
    if: github.event.deployment_status.state == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment failure
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.deployment.sha;
            console.log(`Deployment failed — reporting failure on ${sha}`);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'failure',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              context: 'Deployment Check: Health',
              description: 'Deployment failed — check skipped',
            });
